<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.45"/>
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:0.45"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background — no rounding, iOS clips to rounded rect automatically -->
  <rect width="180" height="180" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="90" x2="180" y2="90" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="90" y1="0" x2="90" y2="180" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Back sine wave (offset/dim) -->
  <path d="M18,90 C30,54 44,54 54,90 C64,126 78,126 90,90 C102,54 116,54 126,90 C136,126 150,126 162,90"
    fill="none" stroke="url(#grad2)" stroke-width="6" stroke-linecap="round"/>

  <!-- Front sine wave -->
  <path d="M18,90 C30,126 44,126 54,90 C64,54 78,54 90,90 C102,126 116,126 126,90 C136,54 150,54 162,90"
    fill="none" stroke="url(#grad1)" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Center glow -->
  <circle cx="90" cy="90" r="14" fill="url(#grad1)" opacity="0.15"/>
  <circle cx="90" cy="90" r="7" fill="url(#grad1)" opacity="0.9" filter="url(#glow)"/>

  <!-- BB text -->
  <text x="90" y="158" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="700" letter-spacing="4" fill="url(#grad1)" opacity="0.7">BINAURAL</text>
</svg>
